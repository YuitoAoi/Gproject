version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: gproject-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Poi114514.
      MYSQL_DATABASE: llama_factory
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPoi114514."]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gproject-net

  redis:
    image: redis:7-alpine
    container_name: gproject-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gproject-net

  gproject:
    build:
      context: ../src-backend
      dockerfile: ../docker/DockerFile
    container_name: gproject-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql+pymysql://root:Poi114514.@mysql:3306/llama_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      DATA_DIR: "/app/datasets"
      JWT_SECRET_KEY: "change-me-in-production"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dataset_data:/app/datasets
    networks:
      - gproject-net

  celery-worker:
    build:
      context: ../src-backend
      dockerfile: ../docker/DockerFile
    container_name: gproject-celery
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info --pool=solo
    environment:
      DATABASE_URL: "mysql+pymysql://root:Poi114514.@mysql:3306/llama_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      DATA_DIR: "/app/datasets"
      JWT_SECRET_KEY: "change-me-in-production"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dataset_data:/app/datasets
    networks:
      - gproject-net

volumes:
  mysql_data:
  dataset_data:

networks:
  gproject-net:
    driver: bridge
